steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'port-o-da-cerveja-gest-o-ponto'
      - '--source=.'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--project=gen-lang-client-0756600199'
      - '--set-env-vars=GEMINI_API_KEY=$_GEMINI_API_KEY,FIREBASE_SERVICE_ACCOUNT=$_FIREBASE_SERVICE_ACCOUNT'

substitutions:
  _GEMINI_API_KEY: ''
  _FIREBASE_SERVICE_ACCOUNT: ''

options:
  logging: CLOUD_LOGGING_ONLY
